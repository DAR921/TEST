<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشرطة العسكرية</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

/* navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#050505;
    border-bottom:1px solid #111;
}

.back-btn{
    color:#0ea5e9;
    text-decoration:none;
}

.title{
    color:#0ea5e9;
}

/* الحاوية */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    max-width:1000px;
    margin:60px auto;
    padding:20px;
}

/* الكروت */
.card{
    background:#050505;
    padding:40px 30px;
    border-radius:18px;
    border:1px solid #111;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    border:1px solid #0ea5e9;
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(14,165,233,0.2);
}

.icon{
    font-size:40px;
    margin-bottom:15px;
    color:#0ea5e9;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:#9ca3af;
    font-size:14px;
}

.link{
    display:block;
    margin-top:10px;
    color:#0ea5e9;
}
</style>
</head>

<body>

<!-- navbar -->
<div class="navbar">
    <a href="../index.html" class="back-btn">⬅ رجوع</a>
    <div class="title">الشرطة العسكرية</div>
</div>

<!-- الكروت -->
<div class="container">

<div class="card" onclick="go('investigation.html')">
    <div class="icon">📁</div>
    <h3>ملف تحقيق</h3>
    <p>فتح ملف تحقيق عسكري</p>
    <span class="link">ابدأ الآن ←</span>
</div>

<div class="card" onclick="go('summon.html')">
    <div class="icon">👤</div>
    <h3>استدعاء عسكري</h3>
    <p>تقديم طلب استدعاء عسكري</p>
    <span class="link">ابدأ الآن ←</span>
</div>

<div class="card" onclick="go('remove.html')">
    <div class="icon">🚫</div>
    <h3>إسقاط حكم</h3>
    <p>تقديم طلب إسقاط حكم</p>
    <span class="link">ابدأ الآن ←</span>
</div>

<div class="card" onclick="go('court.html')">
    <div class="icon">⚖️</div>
    <h3>إصدار حكم</h3>
    <p>إصدار حكم من مجلس القضاء</p>
    <span class="link">ابدأ الآن ←</span>
</div>

<div class="card" onclick="go('dismiss.html')">
    <div class="icon">❌</div>
    <h3>حكم فصل</h3>
    <p>إصدار قرار فصل عسكري</p>
    <span class="link">ابدأ الآن ←</span>
</div>

</div>

<script>
function go(page){
    window.location.href = page;
}
</script>

</body>
</html>
