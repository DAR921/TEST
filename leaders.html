<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>قسم القادة</title>

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;padding:50px;}
button{padding:10px 20px;background:red;color:#fff;border:none;margin-top:20px;}
a{color:#0ea5e9;}
</style>

</head>
<body>

<h1>قسم القادة 🔥</h1>
<p>صفحة محمية</p>

<button onclick="logout()">تسجيل خروج</button>
<br><br>
<a href="index.html">⬅ رجوع</a>

<script>
if(localStorage.getItem("auth")!=="true"){
window.location.href="index.html";
}

function logout(){
localStorage.removeItem("auth");
window.location.href="index.html";
}
</script>

</body>
</html>
